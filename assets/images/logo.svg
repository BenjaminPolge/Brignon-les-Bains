<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="brignonLogoTitle">
  <title id="brignonLogoTitle">Commune de Brignon-les-Bains</title>

  <!-- Outer seal -->
  <circle cx="60" cy="60" r="57" fill="#0f4c5c" stroke="#e9b44c" stroke-width="3"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#e9b44c" stroke-width="1" opacity="0.45"/>

  <!-- Curved commune name -->
  <path id="brignonLogoArc" d="M15,70 A45,45 0 0 1 105,70" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="10.5" letter-spacing="1.4" fill="#f8f5f0">
    <textPath href="#brignonLogoArc" startOffset="50%" text-anchor="middle">BRIGNON-LES-BAINS</textPath>
  </text>

  <!-- Rising steam -->
  <path d="M52,50 Q55,44 52,38" fill="none" stroke="#e9b44c" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <path d="M68,50 Q65,44 68,38" fill="none" stroke="#e9b44c" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>

  <!-- Water drop -->
  <path d="M60,55 C67,66 70,74 60,80 C50,74 53,66 60,55 Z" fill="#e9b44c"/>

  <!-- Water ripples -->
  <path d="M30,92 Q45,84 60,92 Q75,100 90,92" fill="none" stroke="#f8f5f0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30,100 Q45,92 60,100 Q75,108 90,100" fill="none" stroke="#f8f5f0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
</svg>
